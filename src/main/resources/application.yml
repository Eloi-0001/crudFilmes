spring:
  application:
    name: crudFilmes

  datasource:
    url: jdbc:h2:mem:filmes
    username: sa
    password: password
    driver-class-name: org.h2.Driver

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: true

  h2:
    console:
      enabled: true
      path: /h2-console

  web:
    resources:
      static-locations: classpath:/static/
      add-mappings: true

server:
  port: 8080